<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="CSS/login.css">
    <title>Login</title>
</head>
<body>
    <header>
        <section class="cabecalho-logo">
            <img src="img/logo.png">
            <p id="logo"><b>Xhoppi</b></p>

            <p id="entre">Entre</p>

            <p id="ajuda">Precisa de Ajuda?</p>
        </section>
        
    </header>

    <section class="area-container">
        <section class="container">
            <p id="login">Login</p>

            <input type="email" id="email" placeholder="Email">

            <input type="password" id="senha" placeholder="Senha">

            <button type="submit" value="enviar" id="entre">ENTRE</button>

            <section class="links">
                <a href="redefinir_senha.html" id="esqueci_senha">Esqueci minha senha</a>

                <a href="#" id="sms">Fazer login com SMS</a>
            </section>
            
            <section class="ou">
                <hr>OU<hr>
            </section>

            <section class="redes_sociais">
                <button id="facebook">
                    <img src="img/facebook_logo.png">Facebook
                </button>
                <button id="google">
                    <img src="img/google_logo.png">Google
                </button>
                <button id="apple">
                    <img src="img/apple.png">Apple
                </button>
            </section>

            <p id="novo">Novo na xhoppi?<a href="cadastro_cliente.html" id="cadastrar">Cadastar</a></p>
            
        </section>
    </section>
    
</body>
</html>
